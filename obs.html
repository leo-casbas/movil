<!DOCTYPE html>
<html>
<head>
    <title>OBS Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style> 
        body { margin: 0; background: black; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mobileId = urlParams.get('id') || 'CEL123';
        
        console.log('Conectando a:', mobileId);
        
        const peer = new Peer(null, {
            host: '0.peerjs.com',
            port: 443,
            path: '/peerjs'
        });
        
        peer.on('open', (id) => {
            console.log('PC lista:', id);
            const call = peer.call(mobileId, new MediaStream());
            
            call.on('stream', (remoteStream) => {
                console.log('✅ Video OK');
                document.getElementById('video').srcObject = remoteStream;
            });
            
            call.on('error', (err) => {
                console.error('Call error:', err);
            });
        });
    </script>
</body>
</html>
