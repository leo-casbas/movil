<!DOCTYPE html>
<html>
<head>
    <title>OBS Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id') || 'CEL123';
        
        console.log('🔗 Conectando a:', targetId);
        
        const peer = new Peer(); // ID automático
        
        peer.on('open', (id) => {
            console.log('✅ OBS lista:', id);
            
            // Espera 2 segundos para asegurar que celular esté listo
            setTimeout(() => {
                const call = peer.call(targetId, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    console.log('✅ Video recibido');
                    document.getElementById('video').srcObject = remoteStream;
                });
                
                call.on('error', (err) => {
                    console.error('❌ Error llamada:', err);
                });
            }, 2000);
        });
        
        peer.on('error', (err) => {
            console.error('❌ Peer error:', err);
        });
    </script>
</body>
</html>
