<!DOCTYPE html>
<html>
<head>
    <title>OBS Stream</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room') || 'ROOM1';
        
        let pc = new RTCPeerConnection({
            iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
        });
        
        const video = document.getElementById('video');
        
        pc.ontrack = (event) => {
            console.log('✅ Video recibido');
            video.srcObject = event.streams[0];
        };
        
        pc.onicecandidate = (event) => {
            if (event.candidate) console.log('ICE candidate');
        };
        
        // Crear oferta
        async function createOffer() {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Enviar oferta via URL (simplificado)
            const signalUrl = `${window.location.origin}${window.location.pathname}?room=${room}&signal=${btoa(JSON.stringify(offer))}`;
            console.log('Oferta lista:', signalUrl);
        }
        
        pc.oniceconnectionstatechange = () => {
            console.log('ICE state:', pc.iceConnectionState);
        };
        
        // Auto iniciar
        createOffer();
    </script>
</body>
</html>
