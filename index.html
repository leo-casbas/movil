<!DOCTYPE html>
<html>
<head>
    <title>Celular → OBS</title>
    <style>
        body { margin: 0; font-family: Arial; text-align: center; background: #222; color: white; padding: 20px; }
        #container { max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; border-radius: 8px; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        #status { padding: 15px; background: #333; border-radius: 8px; margin: 20px 0; font-weight: bold; }
        #video { width: 100%; height: 300px; background: black; border-radius: 10px; margin-top: 20px; }
        #obsUrl { background: #444; color: #fff; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>📱 Celular → OBS</h1>
        <div id="status">Iniciando WebRTC...</div>
        
        <input id="roomId" value="ROOM1" placeholder="ID de sala">
        <button onclick="startStream()">▶️ Iniciar cámara</button>
        
        <div id="obsInfo" style="display:none;">
            <strong>URL OBS:</strong><br>
            <input id="obsUrl" readonly>
            <button onclick="copyUrl()">📋 Copiar</button>
        </div>
        
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <script>
        let localStream;
        let pc;
        const config = {
            iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
        };

        async function startStream() {
            const status = document.getElementById('status');
            const roomId = document.getElementById('roomId').value || 'ROOM1';
            
            try {
                status.textContent = '🔄 Obteniendo cámara...';
                
                // 1. Cámara
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: true
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                status.textContent = '✅ Cámara activa. Esperando OBS...';
                
                // 2. Configurar signaling manual
                document.getElementById('obsInfo').style.display = 'block';
                document.getElementById('obsUrl').value = `https://leo-casbas.github.io/movil/obs.html?room=${roomId}`;
                
            } catch(err) {
                status.textContent = '❌ Cámara: ' + err.message;
            }
        }

        // Signaling manual via URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signal')) {
            const signal = JSON.parse(atob(urlParams.get('signal')));
            handleOffer(signal);
        }

        async function handleOffer(offer) {
            pc = new RTCPeerConnection(config);
            
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('ICE candidate enviado');
                }
            };
            
            await pc.setRemoteDescription(offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            // Redirigir con respuesta
            const newUrl = `obs.html?room=${document.getElementById('roomId').value}&signal=${btoa(JSON.stringify(pc.localDescription))}`;
            window.location.href = newUrl;
        }

        function copyUrl() {
            navigator.clipboard.writeText(document.getElementById('obsUrl').value);
            document.getElementById('status').textContent = '✅ URL copiada!';
        }
    </script>
</body>
</html>
