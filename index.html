<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub P2P Celular → PC + OBS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📱 Celular → 💻 PC + OBS</h1>
        <div id="status">Listo</div>
        
        <div class="controls">
            <div class="mode-selector">
                <button id="mobileMode" class="mode-btn active">📱 CELULAR (envía)</button>
                <button id="pcMode" class="mode-btn">💻 PC (recibe)</button>
            </div>
            
            <div id="mobileControls">
                <input id="customId" value="MIVIDEO" placeholder="ID fijo">
                <button id="startBtn">▶️ Iniciar stream</button>
                <div class="obs-url">
                    <strong>URL para OBS:</strong> 
                    <input id="obsUrl" readonly placeholder="Se genera aquí">
                    <button onclick="copyObsUrl()">📋 Copiar</button>
                </div>
            </div>
            
            <div id="pcControls" style="display:none;">
                <input id="connectId" value="MIVIDEO" placeholder="ID del celular">
                <button id="connectBtn">Conectar</button>
            </div>
        </div>
        
        <div class="videos">
            <video id="localVideo" class="video local" autoplay muted playsinline></video>
            <video id="remoteVideo" class="video remote" autoplay playsinline></video>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
