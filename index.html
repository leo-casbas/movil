<!DOCTYPE html>
<html>
<head>
    <title>Celular → OBS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial; text-align: center; background: #222; color: white; }
        #container { max-width: 400px; margin: auto; padding: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; }
        button { background: #4CAF50; color: white; border: none; border-radius: 5px; }
        #status { padding: 15px; background: #333; border-radius: 5px; margin: 20px 0; }
        #video { width: 100%; height: 300px; background: #000; border-radius: 10px; }
        #obsUrl { background: #444; color: #fff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="container">
        <h1>📱 Celular → OBS</h1>
        <div id="status">Iniciando...</div>
        
        <input id="peerId" value="CEL123" placeholder="ID único">
        <button id="startCamera">▶️ Permitir cámara</button>
        
        <div id="obsInfo" style="display:none;">
            <strong>URL para OBS:</strong><br>
            <input id="obsUrl" readonly>
            <button onclick="copyUrl()">📋 Copiar</button>
        </div>
        
        <video id="video" autoplay playsinline muted></video>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        const status = document.getElementById('status');

        document.getElementById('startCamera').onclick = async () => {
            try {
                status.textContent = '🔄 Obteniendo cámara...';
                
                // 1. PRIMERO cámara
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 }, 
                    audio: true 
                });
                
                document.getElementById('video').srcObject = localStream;
                status.textContent = '✅ Cámara OK. Creando peer...';
                
                // 2. LUEGO peer
                const id = document.getElementById('peerId').value || 'CEL123';
                peer = new Peer(id, {
                    host: '0.peerjs.com',
                    port: 443,
                    path: '/peerjs'
                });
                
                peer.on('open', (peerId) => {
                    status.textContent = `✅ Listo! ID: ${peerId}`;
                    document.getElementById('obsInfo').style.display = 'block';
                    document.getElementById('obsUrl').value = `https://leo-casbas.github.io/movil/obs.html?id=${peerId}`;
                });
                
                // 3. Escucha llamadas de OBS/PC
                peer.on('call', (call) => {
                    status.textContent = '📞 OBS conectado!';
                    call.answer(localStream); // YA tiene stream listo
                });
                
            } catch(err) {
                status.textContent = '❌ Error cámara: ' + err.message;
            }
        };

        function copyUrl() {
            navigator.clipboard.writeText(document.getElementById('obsUrl').value);
            status.textContent = '✅ URL copiada!';
        }
    </script>
</body>
</html>
