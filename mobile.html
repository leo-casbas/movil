<!DOCTYPE html>
<html>
<head>
    <title>Celular - Conectar PC</title>
    <meta name="viewport" content="width=device-width">
    <style>
        body { margin: 0; text-align: center; background: #111; color: white; font-family: Arial; padding: 20px; }
        input { width: 90%; padding: 15px; font-size: 20px; margin: 10px; }
        button { width: 90%; padding: 15px; background: #4CAF50; color: white; border: none; font-size: 20px; }
        #video { width: 100%; height: 50vh; background: black; margin-top: 20px; }
        #status { padding: 15px; background: #333; margin: 20px 0; }
    </style>
</head>
<body>
    <h2>📱 Conectar a PC</h2>
    <div id="status">Ingresa ID de PC</div>
    
    <input id="roomId" placeholder="ID de la PC (ej: ABC123)" value="PRUEBA">
    <button onclick="connectToPC()">🔗 Conectar</button>
    
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        let localStream, pc;
        
        async function connectToPC() {
            const roomId = document.getElementById('roomId').value;
            const status = document.getElementById('status');
            
            try {
                status.textContent = '🔄 Cámara...';
                
                // 1. Cámara
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: true
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                status.textContent = '✅ Conectando a PC...';
                
                // 2. WebRTC
                pc = new RTCPeerConnection({
                    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
                });
                
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                
                const ws = new WebSocket('wss://simple-webrtc-server.fly.dev');
                
                ws.onopen = async () => {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    
                    ws.send(JSON.stringify({
                        type: 'answer', 
                        room: roomId, 
                        sdp: pc.localDescription
                    }));
                    
                    status.textContent = '✅ Conectado a PC!';
                };
                
            } catch(err) {
                status.textContent = '❌ Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
